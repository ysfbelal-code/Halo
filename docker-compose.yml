version: "3.9"

services:

  # ── FastAPI Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brainrot-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./certs:/app/certs
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - SERVER_HOST=${SERVER_HOST:-localhost}
      - DB_PATH=/app/data/brainrot.db
    networks:
      - brainrot-net

  # ── mitmproxy Content Filter ─────────────────────────────────────
  proxy:
    build:
      context: ./backend
      dockerfile: Dockerfile.proxy
    container_name: brainrot-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./certs:/app/certs
    environment:
      - API_BASE=http://backend:8000
      - FAMILY_ID=${FAMILY_ID:-}
      - FAMILY_TOKEN=${FAMILY_TOKEN:-}
      - DEVICE_NAME=proxy-server
      - RELOAD_EVERY=60
    depends_on:
      - backend
    networks:
      - brainrot-net

  # ── Streamlit Dashboard ──────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: brainrot-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000
    depends_on:
      - backend
    networks:
      - brainrot-net

networks:
  brainrot-net:
    driver: bridge

volumes:
  data:
  certs:
